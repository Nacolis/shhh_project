services:
  db:
    image: mariadb:10.6
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: devroot123
      MYSQL_DATABASE: shhh_dev
      MYSQL_USER: shhh_user
      MYSQL_PASSWORD: devpass123
    ports:
      - "3306:3306"
    volumes:
      - db_dev_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    restart: always
    environment:
      DATABASE_URL: mysql+mysqldb://shhh_user:devpass123@db/shhh_dev
      FLASK_ENV: development
      SECRET_KEY: dev-secret-key-change-in-production
      JWT_SECRET_KEY: dev-jwt-secret-key-change-in-production
    ports:
      - "5500:5000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network
    command: flask run --host=0.0.0.0 --port=5000

volumes:
  db_dev_data:

networks:
  app_network:
    driver: bridge
