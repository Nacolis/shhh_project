server {
    listen 80;
    server_name shh.univ-edt.fr;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name shh.univ-edt.fr;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/shh.univ-edt.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shh.univ-edt.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Au cas ou nginx crash si la backend n'est pas encore prete
    resolver 127.0.0.11 valid=30s;

    location / {
        set $upstream_backend backend;
        proxy_pass http://$upstream_backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
