name: shh_app
description: "End-to-end encrypted messaging app with DedSec aesthetic"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.2
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4
  pointycastle: ^3.9.1
  crypto: ^3.0.6
  encrypt: ^5.0.3
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  google_fonts: ^6.2.1
  flutter_launcher_icons: ^0.14.4
  socket_io_client: ^2.0.3+1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/
    - assets/images/
    - assets/fonts/
